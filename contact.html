<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us – DSC Desk</title>

  <link rel="icon" href="/assets/images/favicon.ico">

  <!-- Tailwind (Alternate CDN) -->
  <script src="https://unpkg.com/tailwindcss-cdn"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/assets/css/style.css?v=2">
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Header Include -->
  <div id="header"></div>
  <script>
    fetch("/includes/header.html?v=2")
      .then(r => r.text())
      .then(html => document.getElementById("header").innerHTML = html)
  </script>

  <!-- Main Content -->
  <main class="container mx-auto px-4 mt-10">
    <div class="bg-white shadow-lg rounded-xl p-8">

      <h1 class="text-3xl font-bold text-blue-700 mb-6">
        Contact Us
      </h1>

      <div class="space-y-4 text-gray-700">

        <p class="text-lg">
          <strong>Email:</strong> support@dscdesk.online
        </p>

        <p class="flex items-center gap-3 text-lg">
          <strong>WhatsApp:</strong>
          <a href="https://wa.me/917559919879" target="_blank"
             class="inline-block">
            <img src="/assets/images/whatsapp-icon.png"
                 alt="WhatsApp"
                 class="w-12 h-12">
          </a>
        </p>

        <p class="text-lg">
          <strong>Location:</strong> Ernakulam, Kerala
        </p>

      </div>

    </div>
  </main>

  <!-- Footer Include -->
  <div id="footer" class="mt-10"></div>
  <script>
    fetch("/includes/footer.html?v=2")
      .then(r => r.text())
      .then(html => document.getElementById("footer").innerHTML = html)
  </script>

</body>
</html>
